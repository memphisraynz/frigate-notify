services:
  frigate-notify:
    build: .
    container_name: frigate-notify
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      APP_SECRET: "change-me"
      ADMIN_PASSWORD: "change-me"
      FRIGATE_AUTOMATION_CONFIG: /data/config.json
    volumes:
      - ./data:/data
