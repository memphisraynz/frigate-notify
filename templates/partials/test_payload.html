<div style="max-width:860px">
  <div style="margin-bottom:24px">
    <h2 style="font-size:22px;font-weight:500;color:var(--heading);margin:0 0 6px">Test Payload</h2>
    <p style="font-size:14px;color:var(--body-subtle);margin:0;line-height:1.5">
      Paste or edit a Frigate review event below &mdash; the same shape Frigate sends on the
      <code>reviews</code> WebSocket topic (a <code>type</code> / <code>before</code> / <code>after</code> object).
      Sending it runs through the full pipeline, bypassing filters and cooldown, so you can test instantly without restarting.
    </p>
  </div>

  <div style="background:var(--neutral-primary-soft);border:1px solid var(--border-default);border-radius:12px;padding:24px;box-shadow:var(--shadow-sm)">
    <textarea id="test-payload-input" class="control font-mono" style="min-height:28rem;width:100%">{{ sample_payload }}</textarea>

    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;align-items:center">
      <button id="send-test-payload" class="btn btn-brand" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Test Payload
      </button>
      <button id="save-test-payload" class="btn btn-ghost btn-sm" type="button">Save payload</button>
      <button id="reset-test-payload" class="btn btn-ghost btn-sm" type="button">Reset to sample</button>
      <span id="test-payload-status" style="display:none;font-size:13px;margin-left:4px"></span>
    </div>
  </div>
</div>
