<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frigate Automation Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="grid min-h-screen place-items-center px-4">
    <form method="post" class="w-full max-w-sm space-y-4 rounded-lg border border-slate-800 bg-slate-900 p-5 shadow-xl">
      <div>
        <h1 class="text-xl font-semibold">Frigate Automation</h1>
        <p class="mt-1 text-sm text-slate-400">Internal configuration access</p>
      </div>
      {% if error %}
        <p class="rounded-md border border-red-900 bg-red-950 px-3 py-2 text-sm text-red-200">{{ error }}</p>
      {% endif %}
      <label class="block text-sm text-slate-300">
        Password
        <input name="password" type="password" autofocus class="mt-2 w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-slate-100 outline-none focus:border-blue-500">
      </label>
      <button class="w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-500">Sign in</button>
    </form>
  </main>
</body>
</html>
